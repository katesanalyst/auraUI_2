<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<p>Open this file in browser, icons auto-downloaded as PNG from SVG.</p>
<script>
const sizes = [72,96,128,144,152,192,384,512];
const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="SIZE" height="SIZE" viewBox="0 0 192 192"><rect width="192" height="192" rx="40" fill="#0085db"/><text x="96" y="120" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="100" fill="white">S</text></svg>`;
sizes.forEach(s => {
  const canvas = document.createElement('canvas');
  canvas.width = s; canvas.height = s;
  const img = new Image();
  img.onload = () => {
    canvas.getContext('2d').drawImage(img, 0, 0, s, s);
    const a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    a.download = `icon-${s}x${s}.png`;
    a.click();
  };
  img.src = 'data:image/svg+xml;base64,' + btoa(svg.replace('SIZE', s));
});
</script>
</body>
</html>
